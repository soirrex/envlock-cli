name: workflows
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  format-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: instal deps
        run: npm i
      - name: run format
        run: npm run format
      - name: run lint
        run: npm run lint
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-0
      - name: instal deps
        run: npm i
      - name: run tests
        run: npm run test
